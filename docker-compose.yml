services:
  judge:
    image: ghcr.io/arnavsinghvi11/officeqa-judge:latest
    container_name: officeqa-judge
    command:
    - --host
    - 0.0.0.0
    - --port
    - '9009'
    - --card-url
    - http://judge:9009
    ports:
    - 9009:9009
    environment:
      PYTHONUNBUFFERED: '1'
      LOG_LEVEL: INFO
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9009/.well-known/agent-card.json
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    depends_on:
      officeqa_agent:
        condition: service_healthy
    networks:
    - agentnet
  officeqa_agent:
    image: ghcr.io/arnavsinghvi11/officeqa-agent:latest
    container_name: officeqa-agent
    command:
    - --host
    - 0.0.0.0
    - --port
    - '9009'
    - --card-url
    - http://officeqa_agent:9009
    ports:
    - 9019:9009
    environment:
      PYTHONUNBUFFERED: '1'
      LLM_PROVIDER: ${LLM_PROVIDER}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      ENABLE_WEB_SEARCH: ${ENABLE_WEB_SEARCH}
      CORPUS_DIR: ${CORPUS_DIR}
      CPI_DATA_PATH: ${CPI_DATA_PATH}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K}
      PARSED_JSON_DIR: /Users/zaidishahbaz/Desktop/side/agentsbeat/officeqa/treasury_bulletins_parsed/jsons
      DEBUG_OUTPUT_DIR: /app/output/solver_debug/run_20260316T114933Z
      WRITE_DEBUG_ARTIFACTS: 'true'
      LLM_CACHE_PATH: /app/output/llm_cache.json
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9009/.well-known/agent-card.json
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
    - agentnet
    volumes:
    - ./output:/app/output
    - /Users/zaidishahbaz/Desktop/side/agentsbeat/officeqa/treasury_bulletins_parsed/transformed:/Users/zaidishahbaz/Desktop/side/agentsbeat/officeqa/treasury_bulletins_parsed/transformed:ro
    - /Users/zaidishahbaz/Desktop/side/agentsbeat/officeqa/treasury_bulletins_parsed/jsons:/Users/zaidishahbaz/Desktop/side/agentsbeat/officeqa/treasury_bulletins_parsed/jsons:ro
  agentbeats-client:
    image: ghcr.io/agentbeats/agentbeats-client:v1.0.0
    container_name: agentbeats-client
    volumes:
    - ./a2a-scenario.toml:/app/scenario.toml
    - ./output:/app/output
    command:
    - scenario.toml
    - output/results.json
    depends_on:
      judge:
        condition: service_healthy
      officeqa_agent:
        condition: service_healthy
    networks:
    - agentnet
networks:
  agentnet:
    driver: bridge
