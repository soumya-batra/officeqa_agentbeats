services:
  judge:
    image: ghcr.io/arnavsinghvi11/officeqa-judge:latest
    container_name: officeqa-judge
    command:
    - --host
    - 0.0.0.0
    - --port
    - '9009'
    - --card-url
    - http://judge:9009
    ports:
    - 9009:9009
    environment:
      PYTHONUNBUFFERED: '1'
      LOG_LEVEL: INFO
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9009/.well-known/agent-card.json
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    depends_on:
      officeqa_agent:
        condition: service_healthy
    networks:
    - agentnet
  officeqa_agent:
    build:
      context: .
      dockerfile: Dockerfile.officeqa-agent
    container_name: officeqa-agent
    command:
    - --host
    - 0.0.0.0
    - --port
    - '9019'
    - --card-url
    - http://officeqa_agent:9019
    ports:
    - 9019:9019
    environment:
      PYTHONUNBUFFERED: '1'
      LLM_PROVIDER: ${LLM_PROVIDER}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      ENABLE_WEB_SEARCH: ${ENABLE_WEB_SEARCH}
      CORPUS_DIR: /app/corpus
      FAISS_INDEX_DIR: /app/faiss_index
      CPI_DATA_PATH: ${CPI_DATA_PATH}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-8}
      WRITE_DEBUG_ARTIFACTS: 'true'
      LLM_CACHE_PATH: /app/output/llm_cache.json
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9019/.well-known/agent-card.json
      interval: 30s
      timeout: 5s
      retries: 500
      start_period: 7200s
    networks:
    - agentnet
    volumes:
    - ./output:/app/output
    - ./treasury_bulletins_transformed:/app/corpus:ro
    - ./faiss_index:/app/faiss_index
  agentbeats-client:
    image: ghcr.io/agentbeats/agentbeats-client:v1.0.0
    container_name: agentbeats-client
    volumes:
    - ./a2a-scenario.toml:/app/scenario.toml
    - ./output:/app/output
    command:
    - scenario.toml
    - output/results.json
    depends_on:
      judge:
        condition: service_healthy
      officeqa_agent:
        condition: service_healthy
    networks:
    - agentnet
networks:
  agentnet:
    driver: bridge
