services:
  judge:
    container_name: officeqa-judge
    build:
      context: .
      dockerfile: Dockerfile.officeqa-judge
    command:
    - --host
    - 0.0.0.0
    - --port
    - '9009'
    - --card-url
    - http://judge:9009
    ports:
    - 9009:9009
    environment:
      PYTHONUNBUFFERED: '1'
      LOG_LEVEL: INFO
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9009/.well-known/agent-card.json
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    depends_on:
      officeqa_agent:
        condition: service_healthy
    networks:
    - agentnet
  officeqa_agent:
    container_name: officeqa-agent
    image: ghcr.io/soumya-batra/officeqa-agent:latest
    command:
    - --host
    - 0.0.0.0
    - --port
    - '9009'
    - --card-url
    - http://officeqa_agent:9009
    ports:
    - 9019:9009
    environment:
      PYTHONUNBUFFERED: '1'
      LLM_PROVIDER: nebius
      NEBIUS_API_KEY: ${NEBIUS_API_KEY}
      NEBIUS_MODEL: ${NEBIUS_MODEL}
      NEBIUS_BASE_URL: ${NEBIUS_BASE_URL}
      RETRIEVAL_TOP_K: '8'
      FAISS_INDEX_DIR: /app/faiss_index
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      DEBUG_OUTPUT_DIR: /app/output/solver_debug/run_20260416T233933Z
      WRITE_DEBUG_ARTIFACTS: 'true'
      LLM_CACHE_PATH: /app/output/llm_cache.json
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9009/.well-known/agent-card.json
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
    - agentnet
    volumes:
    - ./output:/app/output
  agentbeats-client:
    image: ghcr.io/agentbeats/agentbeats-client:v1.0.0
    container_name: agentbeats-client
    volumes:
    - ./a2a-scenario.toml:/app/scenario.toml
    - ./output:/app/output
    command:
    - scenario.toml
    - output/results.json
    depends_on:
      judge:
        condition: service_healthy
      officeqa_agent:
        condition: service_healthy
    networks:
    - agentnet
networks:
  agentnet:
    driver: bridge
